spring.application.name=mycoolapp

#### Core
# Log levels severity mapping
# TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=TRACE
logging.level.com.luv2code=INFO

# Log file name
logging.file.name=my-crazy-stuff.log
logging.file.path=c:/myapps/demo

#### Web
# Spring Boot embedded HTTP server port
server.port=8080
# Root URL for the app
server.servlet.context-path=/mycoolapp

# Default HTTP session time out
server.servlet.session.timeout=15m

####  Actuator
## Endpoints to include by name or wildcard

# Use wildcard "*" to expose all endpoints
management.endpoints.web.exposure.include=*

# Enable to allow for info endpoint
management.info.env.enabled=true

# Can also expose individual endpoints with a comma-delimited list
# management.endpoints.web.exposure.include=health,beans,mappings
# auditevents - 404?

# Exclude individual endpoints with a comma-delimited list
# management.endpoints.web.exposure.exclude=health,info

## Base path for actuator endpoints
management.endpoints.web.base-path=/actuator

#### Security

# Default user name
spring.security.user.name=admin
# Password for default user
spring.security.user.password=topsecret

#### Data

# JBDC URL of the database
# spring.datasource.url=jbdc:mysql://localhost:3306/ecommerce
# Login username of the database
# spring.datasource.username=alex
# Login password of the database
# spring.datasource.password=tiger

